<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voltras Dashboard (SPA)</title>
    <!--
      Bootstrap paint only. These two literals mirror titan's
      `--color-background-base` (#101010) and `--color-text-primary` (#f3f4f6)
      so the first frame matches the theme before the bundle loads
      `theme/global.css` (which then owns every colour via `var(--color-*)` —
      see spa/colors.ts). They are the ONLY hard-coded colours in the SPA, kept
      here because the CSS variables do not exist until the bundle mounts.
    -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #101010;
        color: #f3f4f6;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
